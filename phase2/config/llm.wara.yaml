project:
  name: "wara-research-agent"
  mode: "controller-orchestrated"

research:
  topic: "Set by the WARA controller"
  domains:
    - "wireless-communications"
    - "optimization"
    - "ieee-wcl"
  daily_paper_count: 20
  quality_threshold: 4.5
  graceful_degradation: true

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 2
  retry_limit: 1

notifications:
  channel: "console"
  target: ""
  on_phase_start: false
  on_phase_fail: true
  on_gate_required: false

knowledge_base:
  backend: "markdown"
  root: ".wara/kb"

llm:
  provider: "openai"
  base_url: "https://api.openai.com/v1"
  wire_api: "chat_completions"
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  primary_model: "gpt-5.5"
  fallback_models: []
  reviewer_model: "gpt-5.5"
  reviewer_fallback_models: []
  reviewer_thinking_mode: "disabled"
  reviewer_min_score: 7.5
  reviewer_strict: true
  timeout_sec: 900
  max_retries: 3
  retry_base_delay: 8
  retry_max_delay: 60
