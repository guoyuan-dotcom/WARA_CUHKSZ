  Frozen mathematical interface from Phase 2.1:
  {mathematical_contract_json}

  Phase 2.1 system model:
  {system_model_md}

  Phase 2.1 problem formulation:
  {problem_formulation_md}

  Phase 2.1 core theory package:
  {core_theory_package_md}

  Output requirements:
  - Return valid JSON only.
  - Keys must be exactly:
    - convexity_audit_md
    - reformulation_path_md
  - Each value must be a markdown string.

  The convexity audit should identify:
  - optimization variables
  - objective structure
  - each constraint block
  - whether each block is convex / affine / DC / bilinear / fractional / manifold-like
  - the selected tractability route and the true source(s) of technical difficulty, which may be convex-direct, structured nonconvex, relaxation/recovery, mixed/discrete/manifold, or heuristic/empirical
  - what can be preserved exactly versus what likely needs approximation or block decomposition

  The reformulation path should identify:
  - the original frozen formulation and the selected solution route
  - the proposed formulation, direct solver, relaxation, decomposition, or heuristic/proxy route required by that branch
  - recommended algorithm family selected from the current problem structure and route decision, not from a fixed template
  - for convex_direct, the exact representation used by the solver, the physical-variable recovery map if any, and the strongest structural insight that can be stated without overclaiming
  - what each block solves
  - what intermediate surrogate or lifted variables are introduced
  - what claims seem provable versus only empirically checkable
  - the Technical Closure Plan described above, written as positive instructions for the downstream algorithm and experiment agents

  Length guidance:
  - convexity_audit_md: about 500-900 words
  - reformulation_path_md: about 500-900 words

  Before returning, verify internally:
  1. The selected route gives Phase 2.3 a concrete algorithm object, not only a diagnosis.
  2. The Technical Closure Plan states what can be claimed, what must be implemented, and what KPI will demonstrate the claim.
  3. Any unresolved proof/modeling risk is scoped as a route limitation rather than promoted to a theorem-level claim.
