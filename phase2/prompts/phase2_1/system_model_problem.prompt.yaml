  Output requirements:
  - Return valid JSON only.
  - Keys must be exactly:
    - mathematical_contract
    - system_model_md
    - problem_formulation_md
    - core_theory_package_md
  - mathematical_contract must be a JSON object with the exact keys listed above.
  - system_model_md, problem_formulation_md, and core_theory_package_md must be markdown strings.

  The markdown should be contract-driven rather than exhaustive. It should give later phases only the material needed to:
  - preserve the mathematical_contract
  - distinguish controls, parameters, random quantities, derived quantities, constraints, and reformulation-only auxiliaries
  - identify the objective, original constraints, and dominant convexity/tractability status or technical difficulty
  - understand any benchmark or surrogate only when the Phase 1 handoff explicitly requires one

  Concision guidance:
  - Do not target a fixed word count.
  - Prefer a minimal, complete interface draft over a long explanatory draft.
  - Avoid adding reformulation paths, benchmark details, intermediate variables, or implementation hints merely to make the section feel complete.
  - If a later-phase item is useful but not part of the original optimization problem, place it only in core_theory_package_md and mark it as reformulation-only.

  Before returning, verify internally:
  1. Every optimizer variable is listed under controls.
  2. No derived_quantity appears in the optimizer.
  3. No reformulation_only symbol appears in system_model_md or problem_formulation_md.
  4. Every objective term uses only controls, parameters, random quantities, and derived quantities defined in the contract.
  5. Every constraint appears under constraints and uses canonical notation.
  6. No equivalent reformulation, threshold substitution, or auxiliary-variable transformation appears in problem_formulation_md unless it is part of the original Phase 1 handoff.
  7. The first-pass formulation already contains a closed research path: physical coupling, controllable variables, paper KPI, tractability seed, and experiment observable.
