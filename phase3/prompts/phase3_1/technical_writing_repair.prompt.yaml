  {topic}

  Frozen mathematical interface:
  {mathematical_contract_json}

  Issue summary:
  {issue_summary}

  Relevant compile-log tail:
  {compile_log_tail}

  Current system/problem LaTeX:
  {current_system_model_problem_formulation_tex}

  Current proposed-method LaTeX:
  {current_proposed_solution_tex}
